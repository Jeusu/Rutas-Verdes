<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutas Verdes</title>

<!-- Leaflet -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Ventana de aviso actualizacion 
  <div id="modalBienvenida" class="modal-bienvenida">
  <div class="aviso-contenido">
    <button class="cerrar-aviso" onclick="cerrarBienvenida()">✖</button>
    <h2 style="color: #ffcc00; margin-top: 0;">⚠ ATENCIÓN</h2> <!-- Esto es el titulo de la ventana emerjente 
    <p>Rutas Actualizadas!</p> <!-- Esto es el texto de la ventana emerjente
    <p><strong>¡Gracias por usar mi proyecto!</strong></p> <!-- Esto es el texto de abajo de la ventana emerjente 
    <button class="opcion-btn" onclick="cerrarBienvenida()" style="background: #009900; margin-top: 15px;">Entendido</button>
  </div>
</div> -->

<!-- Ventana de aviso fuera del mapa -->
<div id="avisoDestinoFuera" style="display:none;">
  <div class="aviso-contenido">
    <button class="cerrar-aviso" onclick="ocultarAvisoDestino()">✖</button>
    <h3>⚠ Fuera del área</h3>
    <p>Está fuera del rango de las busetas (Fuera de Sincelejo)</p>
  </div>
</div>

<!-- Cuadro de búsqueda + sugerencias -->
<div id="buscador-container">
  <input type="text" id="buscadorDestino" placeholder="Tu destino." 
    style="width:100%; padding:10px; border-radius:8px; border:none; font-size:16px;">
  
  <div id="sugerencias"></div>
</div>

  <div id="mapa"></div>

  <!-- Fondo oscuro del menú -->
<div id="overlayDestino" style="display:none;"></div>

<!--  Menú de destino -->
<div id="menuDestino" class="menu-destino">
  <h3>Selecciona una opción:</h3>
  <button id="opMapa" class="opcion-btn">📍 Seleccionar en el mapa</button>
  <button id="opBuscar" class="opcion-btn">🔎 Buscar destino</button>
</div>

<button id="toggleMenu" class="toggle-menu">Menu</button>

  <!--  Menú para ocultar/mostrar rutas -->
<div class="menu" id="menuRutas">
  <h4>Rutas</h4>

  <div class="item">
    <label>
      <input type="checkbox" id="a_ida" checked>
      <span class="check"></span>
      Ruta A - Ida
    </label>
    <span class="color-cuadro verde"></span>
  </div>

  <div class="item">
    <label>
      <input type="checkbox" id="a_retorno" checked>
      <span class="check"></span>
      Ruta A - Retorno
    </label>
    <span class="color-cuadro naranja"></span>
  </div>

  <div class="item">
    <label>
      <input type="checkbox" id="b_ida" checked>
      <span class="check"></span>
      Ruta B - Ida
    </label>
    <span class="color-cuadro azul"></span>
  </div>

  <div class="item">
    <label>
      <input type="checkbox" id="b_retorno" checked>
      <span class="check"></span>
      Ruta B - Retorno
    </label>
    <span class="color-cuadro rojo"></span>
  </div>
</div>

<!--  Botones inferiores -->
<div class="inferior">
    <button id="btnUbicacion" class="btn">¿Dónde estás?</button>
    <button id="btnDestino" class="btn">¿Hacia dónde?</button>

    <!--  Cuadro de búsqueda + sugerencias -->
      
      <div id="sugerencias" style="
        display:none;
        background:#1a1a1a;
        margin-top:5px;
        border-radius:8px;
        padding:10px;
        max-height:200px;
        overflow-y:auto;
      "></div>
    </div>
</div>

  <!--  Firma -->
  <div class="firma">@jeusu</div>

<script src="script.js"></script>

</body>
</html>
